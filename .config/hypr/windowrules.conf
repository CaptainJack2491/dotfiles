# Basic Floating Dialogs (Title Based)
windowrule {
    name = float-dialogs
    match:title = ^(file_progress|confirm|dialog|download|notification|error|splash|btop|confirmreset|Lxappearance|wofi|zenity|viewnior|Open File|branchdialog|Picture-in-Picture)$
    float = on
}

# Floating Apps (Class Based)
windowrule {
    name = float-apps-class
    match:class = ^(org.gnome.Nautilus|waypaper|Gvim|pavucontrol|pavucontrol-qt)$
    float = on
}

# Volume Control (Preserving your exact size and move)
windowrule {
    name = volume-control-geometry
    match:title = ^(Volume Control)$
    float = on
    size = 800 600
    move = 39% 420
}

# Quick Note (Preserving size, move, and animation)
windowrule {
    name = quick-note-geometry
    match:title = ^(quick_note)$
    float = on
    size = 550 80
    move = 35% 50%
    animation = popin
}

# Styling & Effects
windowrule {
    name = typst-preview-opacity
    match:title = ^(Typst Preview - qutebrowser)$
    opacity = 0.8
}

windowrule {
    name = logout-behavior
    match:title = ^(wlogout)$
    float = on
    fullscreen = on
}

# Idle Inhibitors
windowrule {
    name = media-idle-inhibit
    match:class = ^(mpv)$
    idle_inhibit = focus
}

windowrule {
    name = browser-idle-inhibit
    match:class = ^(Vivaldi-stable|vivaldi)$
    idle_inhibit = fullscreen
}

# Workspaces
windowrule {
    name = qutebrowser-ws
    match:class = ^(qutebrowser)$
    workspace = 2
}

windowrule {
    name = ytmusic-special
    match:class = ^(YouTube Music)$
    workspace = special
}

# if title is notes, workspace = special
windowrule {
    name = notes-ws
    match:title = ^(notes)$
    workspace = special
}
